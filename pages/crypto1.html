<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Tracker | Global Money Lens</title>
  <meta name="description" content="Track live cryptocurrency prices in real time with the Crypto Tracker from Global Money Lens.">
  <style>
    :root {
      --primary: #0a2342;
      --accent: #1abc9c;
      --accent-dark: #1abc9c;
      --bg: #f8fafc;
      --white: #fff;
      --shadow: 0 8px 32px rgba(15,23,42,0.10);
      --card-radius: 1.1rem;
      --red: #e11d48;
      --green: #22c55e;
    }
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--primary);
      min-height: 100vh;
    }
    a {
      text-decoration: none;
      color: inherit;
    }
    /* NAVBAR */
   .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--white);
            box-shadow: 0 2px 8px rgba(10,35,66,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
        }
        .nav-container {
            width: 92%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
        }
        .logo img {
            height: 42px;
            max-height: 50px;
            width: auto;
            margin-right: 0.7rem;
        }
        .brand-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 1px;
        }
        .nav-menu {
            display: flex;
            gap: 2.2rem;
        }
        .nav-menu a {
            color: var(--primary);
            font-size: 1.05rem;
            font-weight: 550;
            padding: 0.4rem 0.7rem;
            border-radius: 2rem;
            transition: background 0.2s, color 0.2s;
        }
        .nav-menu a:hover {
            background: var(--accent);
            color: var(--white);
        }
    /* HEADER */
    .header-section {
      text-align: center;
      margin: 2.5rem 0 1.5rem 0;
    }
    .header-section h1 {
      font-size: 2.1rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 0.5rem;
      letter-spacing: 0.5px;
    }
    .header-section p {
      font-size: 1.13rem;
      color: #3a4a5d;
      margin: 0;
    }
    /* CARD */
    .tracker-container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 60vh;
      padding-bottom: 40px;
    }
    .tracker-card {
      background: var(--white);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow);
      padding: 2.2rem 2rem 1.7rem 2rem;
      width: 100%;
      max-width: 410px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 0 auto;
      transition: box-shadow 0.2s;
    }
    .tracker-card:focus-within {
      box-shadow: 0 12px 36px rgba(34,197,94,0.10);
    }
    /* INPUTS */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }
    .input-group label {
      font-size: 1rem;
      font-weight: 500;
      color: var(--primary);
      margin-bottom: 2px;
    }
    .input-group select,
    .input-group input[type="number"] {
      padding: 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1.05rem;
      background: #f8fafc;
      transition: border 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .input-group select:focus,
    .input-group input[type="number"]:focus {
      border: 1.5px solid var(--accent);
      box-shadow: 0 0 0 2px #bbf7d0;
    }
    /* BUTTON */
    .tracker-btn {
      margin-top: 10px;
      padding: 14px 0;
      background: var(--accent);
      color: #fff;
      font-size: 1.15rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(34,197,94,0.08);
      transition: background 0.2s, transform 0.18s, box-shadow 0.18s;
      letter-spacing: 0.5px;
    }
    .tracker-btn:hover, .tracker-btn:focus {
      background: var(--accent-dark);
      transform: scale(1.035);
      box-shadow: 0 4px 16px rgba(34,197,94,0.18);
    }
    /* RESULTS */
    .result-section {
      margin-top: 22px;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(.4,0,.2,1), transform 0.35s cubic-bezier(.4,0,.2,1);
    }
    .result-section.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.08rem;
      margin-bottom: 8px;
    }
    .result-label {
      color: #3a4a5d;
      font-weight: 500;
    }
    .result-value {
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .result-value.positive {
      color: var(--green);
    }
    .result-value.negative {
      color: var(--red);
    }
    .result-value.neutral {
      color: var(--primary);
    }
    .trend-arrow {
      font-size: 1.1em;
      margin-left: 0.3em;
      vertical-align: middle;
    }
    /* LOADING/ERROR */
    .loading,
    .error {
      text-align: center;
      color: #888;
      margin-top: 1em;
      font-size: 1.05em;
    }
    .error {
      color: var(--red);
    }
    /* RESPONSIVE */
    @media (max-width: 700px) {
      .tracker-card {
        padding: 1.3rem 0.5rem 1.1rem 0.5rem;
        max-width: 98vw;
      }
      .tracker-container {
        padding-bottom: 20px;
      }
      .header-section {
        margin: 1.5rem 0 1rem 0;
      }
    }
    @media (max-width: 500px) {
      .nav-menu {
        gap: 1rem;
      }
      .logo img {
        height: 32px;
      }
    }
    /* FOOTER */
    footer {
      background: var(--primary);
      color: var(--white);
      padding: 1.5rem 0 1rem 0;
      text-align: center;
      margin-top: 48px;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 0.7rem;
    }
    .footer-links a {
      color: var(--accent);
      font-size: 1rem;
      transition: color 0.2s;
    }
    .footer-links a:hover {
      color: var(--white);
    }
    .footer-social {
      margin-top: 0.7rem;
      display: flex;
      justify-content: center;
      gap: 1.2rem;
    }
    .footer-social a {
      color: var(--white);
      font-size: 1.3rem;
      transition: color 0.2s;
    }
    .footer-social a:hover {
      color: var(--accent);
    }
  </style>
</head>

  <script>
    // CoinGecko API coin IDs and symbols
    const COINS = {
      bitcoin: { name: "Bitcoin", symbol: "BTC" },
      ethereum: { name: "Ethereum", symbol: "ETH" },
      binancecoin: { name: "Binance Coin", symbol: "BNB" },
      solana: { name: "Solana", symbol: "SOL" },
      ripple: { name: "Ripple", symbol: "XRP" },
      cardano: { name: "Cardano", symbol: "ADA" },
      dogecoin: { name: "Dogecoin", symbol: "DOGE" },
      polkadot: { name: "Polkadot", symbol: "DOT" },
      tron: { name: "TRON", symbol: "TRX" },
      litecoin: { name: "Litecoin", symbol: "LTC" }
    };

    function formatCurrency(val) {
      return '$' + Number(val).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'block' : 'none';
    }
    function showError(msg) {
      const err = document.getElementById('error');
      err.textContent = msg;
      err.style.display = msg ? 'block' : 'none';
    }
    function showResults(html) {
      const res = document.getElementById('result-section');
      res.innerHTML = html;
      res.classList.add('visible');
    }

    async function fetchCryptoPrice(coinId) {
      const url = `https://api.coingecko.com/api/v3/simple/price?ids=${coinId}&vs_currencies=usd&include_24hr_change=true`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('Failed to fetch price');
      return resp.json();
    }

    function renderResults(coinId, price, change, amount) {
      const coin = COINS[coinId];
      const value = amount > 0 ? price * amount : null;
      let changeClass = "neutral", arrow = "";
      if (typeof change === "number") {
        if (change > 0) {
          changeClass = "positive";
          arrow = '<span class="trend-arrow">&#8599;</span>';
        } else if (change < 0) {
          changeClass = "negative";
          arrow = '<span class="trend-arrow">&#8600;</span>';
        }
      }
      return `
        <div class="result-row">
          <span class="result-label">Current Price (${coin.symbol})</span>
          <span class="result-value">${formatCurrency(price)}</span>
        </div>
        ${value !== null ? `
        <div class="result-row">
          <span class="result-label">Value of Holdings</span>
          <span class="result-value neutral">${formatCurrency(value)}</span>
        </div>
        ` : ""}
        <div class="result-row">
          <span class="result-label">24h Change</span>
          <span class="result-value ${changeClass}">${change !== null && change !== undefined ? change.toFixed(2) + '%' : '--'} ${arrow}</span>
        </div>
      `;
    }

    async function handleCheckPrice(e) {
      e.preventDefault();
      showError('');
      showResults('');
      showLoading(true);

      const coinId = document.getElementById('coin').value;
      const amount = parseFloat(document.getElementById('amount').value) || 0;

      try {
        const data = await fetchCryptoPrice(coinId);
        const price = data[coinId]?.usd;
        const change = data[coinId]?.usd_24h_change;
        if (typeof price !== "number") throw new Error("Price unavailable");
        showResults(renderResults(coinId, price, change, amount));
      } catch (err) {
        showError("Could not fetch price. Please try again later.");
      } finally {
        showLoading(false);
      }
    }

    // Optional: auto-refresh every 30s
    let autoRefreshTimer = null;
    function setupAutoRefresh() {
      if (autoRefreshTimer) clearInterval(autoRefreshTimer);
      autoRefreshTimer = setInterval(() => {
        const coinId = document.getElementById('coin').value;
        const amount = parseFloat(document.getElementById('amount').value) || 0;
        // Only refresh if results are visible
        if (document.getElementById('result-section').innerHTML.trim()) {
          showLoading(true);
          fetchCryptoPrice(coinId)
            .then(data => {
              const price = data[coinId]?.usd;
              const change = data[coinId]?.usd_24h_change;
              if (typeof price === "number") {
                showResults(renderResults(coinId, price, change, amount));
              }
            })
            .catch(() => {})
            .finally(() => showLoading(false));
        }
      }, 30000);
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('crypto-form').addEventListener('submit', handleCheckPrice);
      document.getElementById('coin').addEventListener('change', function() {
        document.getElementById('result-section').innerHTML = '';
        showError('');
      });
      document.getElementById('amount').addEventListener('input', function() {
        // If results are visible, update value of holdings
        const html = document.getElementById('result-section').innerHTML;
        if (html.trim()) {
          document.getElementById('crypto-form').dispatchEvent(new Event('submit'));
        }
      });
      setupAutoRefresh();
    });
  </script>
