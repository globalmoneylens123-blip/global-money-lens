<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0EGV78MQ1S"></script>
  <script>

  <title>Savings Planner | Global Money Lens</title>
  <meta name="description" content="Plan your savings goals and achieve them faster with the Savings Planner from Global Money Lens.">
  <style>
    :root {
      --primary: #0a2342;
      --accent: #1abc9c;
      --accent-dark: #1abc9c;
      --bg: #f8fafc;
      --white: #fff;
      --shadow: 0 8px 32px rgba(15,23,42,0.10);
      --card-radius: 1.1rem;
    }
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--primary);
      min-height: 100vh;
      width: 100vw;
      max-width: 100vw;
      overflow-x: hidden;
    }
    body {
      min-height: 100vh;
      width: 100vw;
      max-width: 100vw;
      overflow-x: hidden;
      position: relative;
    }
    #page-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      width: 100vw;
      max-width: 100vw;
      box-sizing: border-box;
    }
    main {
      flex: 1 0 auto;
      width: 100vw;
      max-width: 100vw;
      box-sizing: border-box;
    }
    a {
      text-decoration: none;
      color: inherit;
    }
    /* NAVBAR */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      box-shadow: 0 2px 8px rgba(10,35,66,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
    }
    .nav-container {
      width: 92%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
    }
    .logo img {
      height: 42px;
      max-height: 50px;
      width: auto;
      margin-right: 0.7rem;
    }
    .brand-name {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 1px;
    }
    .nav-menu {
      display: flex;
      gap: 2.2rem;
    }
    .nav-menu a {
      color: var(--primary);
      font-size: 1.05rem;
      font-weight: 550;
      padding: 0.4rem 0.7rem;
      border-radius: 2rem;
      transition: background 0.2s, color 0.2s;
    }
    .nav-menu a:hover {
      background: var(--accent);
      color: var(--white);
    }
    /* Hamburger for mobile */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      margin-left: 1rem;
    }
    .hamburger span {
      width: 26px;
      height: 3px;
      background: var(--primary);
      margin: 4px 0;
      border-radius: 2px;
      transition: all 0.3s;
    }
    @media (max-width: 800px) {
      .nav-menu {
        position: absolute;
        top: 60px;
        right: 0;
        left: auto;
        background: var(--white);
        flex-direction: column;
        width: 100vw;
        max-width: 320px;
        box-shadow: 0 8px 24px rgba(10,35,66,0.13);
        gap: 0;
        padding: 1rem 0;
        display: none;
        z-index: 1000;
      }
      .nav-menu.open {
        display: flex;
      }
      .nav-menu a {
        padding: 1rem 2rem;
        border-radius: 0;
        border-bottom: 1px solid #eee;
        font-size: 1.1rem;
      }
      .hamburger {
        display: flex;
      }
      .nav-container {
        position: relative;
      }
    }
    /* HEADER */
    .header-section {
      text-align: center;
      margin: 2.5rem 0 1.5rem 0;
    }
    .header-section h1 {
      font-size: 2.1rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 0.5rem;
      letter-spacing: 0.5px;
    }
    .header-section p {
      font-size: 1.13rem;
      color: #3a4a5d;
      margin: 0;
    }
    /* CARD */
    .calc-container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 60vh;
      padding-bottom: 40px;
      box-sizing: border-box;
      width: 100vw;
      max-width: 100vw;
    }
    .calc-card {
      background: var(--white);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow);
      padding: 2.2rem 2rem 1.7rem 2rem;
      width: 100%;
      max-width: 410px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 0 auto;
      transition: box-shadow 0.2s;
      box-sizing: border-box;
    }
    .calc-card:focus-within {
      box-shadow: 0 12px 36px rgba(34,197,94,0.10);
    }
    /* INPUTS */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }
    .input-group label {
      font-size: 1rem;
      font-weight: 500;
      color: var(--primary);
      margin-bottom: 2px;
    }
    .input-group input[type="number"] {
      padding: 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1.05rem;
      background: #f8fafc;
      transition: border 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .input-group input[type="number"]:focus {
      border: 1.5px solid var(--accent);
      box-shadow: 0 0 0 2px #bbf7d0;
    }
    .input-row {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .input-row input[type="number"] {
      flex: 1;
    }
    .input-row select {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1.5px solid #e2e8f0;
      font-size: 1.05rem;
      background: #f8fafc;
      color: var(--primary);
      transition: border 0.2s;
      outline: none;
    }
    .input-row select:focus {
      border: 1.5px solid var(--accent);
    }
    /* BUTTON */
    .calc-btn {
      margin-top: 10px;
      padding: 14px 0;
      background: var(--accent);
      color: #fff;
      font-size: 1.15rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(34,197,94,0.08);
      transition: background 0.2s, transform 0.18s, box-shadow 0.18s;
      letter-spacing: 0.5px;
    }
    .calc-btn:hover, .calc-btn:focus {
      background: var(--accent-dark);
      transform: scale(1.035);
      box-shadow: 0 4px 16px rgba(34,197,94,0.18);
    }
    /* RESULTS */
    .result-section {
      margin-top: 22px;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(.4,0,.2,1), transform 0.35s cubic-bezier(.4,0,.2,1);
    }
    .result-section.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.08rem;
      margin-bottom: 8px;
    }
    .result-label {
      color: #3a4a5d;
      font-weight: 500;
    }
    .result-value {
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .result-value.success {
      color: var(--accent);
    }
    .result-value.neutral {
      color: var(--primary);
    }
    /* PROGRESS BAR */
    .progress-bar-wrap {
      margin-top: 18px;
      height: 18px;
      background: #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(15,23,42,0.04);
    }
    .progress-bar {
      background: var(--accent);
      height: 100%;
      width: 0%;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }
    /* FOOTER */
    footer {
      background: var(--primary);
      color: var(--white);
      padding: 1.5rem 0 1rem 0;
      text-align: center;
      margin-top: 48px;
      width: 100vw;
      max-width: 100vw;
      overflow-x: hidden;
      box-sizing: border-box;
      flex-shrink: 0;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 0.7rem;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--accent);
      font-size: 1rem;
      transition: color 0.2s;
    }
    .footer-links a:hover {
      color: var(--white);
    }
    .footer-social {
      margin-top: 0.7rem;
      display: flex;
      justify-content: center;
      gap: 1.2rem;
    }
    .footer-social a {
      color: var(--white);
      font-size: 1.3rem;
      transition: color 0.2s;
    }
    .footer-social a:hover {
      color: var(--accent);
    }
    /* RESPONSIVE */
    @media (max-width: 1100px) {
      .nav-container { width: 98%; }
    }
    @media (max-width: 900px) {
      .calc-container {
        padding-bottom: 20px;
      }
      .header-section {
        margin: 1.5rem 0 1rem 0;
      }
    }
    @media (max-width: 700px) {
      .calc-card {
        padding: 1.3rem 0.5rem 1.1rem 0.5rem;
        max-width: 98vw;
      }
      .calc-container {
        padding-bottom: 20px;
        width: 100vw;
        max-width: 100vw;
      }
      .header-section {
        margin: 1.5rem 0 1rem 0;
      }
    }
    @media (max-width: 600px) {
      html, body {
        width: 100vw;
        max-width: 100vw;
        overflow-x: hidden;
      }
      #page-wrap {
        min-height: 100vh;
        width: 100vw;
        max-width: 100vw;
        box-sizing: border-box;
      }
      .header-section h1 {
        font-size: 1.3rem;
      }
      .header-section p {
        font-size: 1rem;
      }
      .calc-card {
        padding: 1rem 0.2rem 0.7rem 0.2rem;
        max-width: 100vw;
      }
      .result-row {
        font-size: 0.98rem;
      }
      .footer-links {
        gap: 1rem;
      }
    }
    @media (max-width: 500px) {
      html, body {
        width: 100vw;
        max-width: 100vw;
        overflow-x: hidden;
      }
      .nav-menu {
        gap: 1rem;
      }
      .logo img {
        height: 28px;
      }
      #page-wrap, .calc-container, .calc-card, footer {
        width: 100vw;
        max-width: 100vw;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>
  <div id="page-wrap">
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">
          <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgmIMu_wNq1Ex_A9tM-SDkxYA-v0UodSi4fgn7s1bcreBVausUOopa5aVABrUgxxv5PGuAeWyn7Y_WpFA14QiboaQkXgJbaXYH_F0CHrMAHI9SJpZoEjFLqoEiPdJ39fsQSKZXhrdlvlvXjexmuMHMPH-J-Nhd9BCZWExjC3Fr5cXU1IIPnJGwL7au2tMpE/s1600/ChatGPT%20Image%20Apr%2022,%202026,%2008_51_59%20PM.png" alt="Global Money Lens Logo">
          <span class="brand-name">Global Money Lens</span>
        </div>
        <div class="hamburger" id="hamburger" aria-label="Open menu" tabindex="0">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="nav-menu" id="navMenu">

    <!-- Header Section -->
    <section class="header-section">
      <h1>Savings Planner</h1>
      <p>Plan your savings goals and achieve them faster</p>
    </section>
    <!-- Calculator Card -->
    <main>
      <div class="calc-container">
        <form class="calc-card" id="savings-form" autocomplete="off" onsubmit="return false;">
          <div class="input-group">
            <label for="goal">Savings Goal Amount</label>
            <input type="number" id="goal" min="0" step="0.01" placeholder="e.g. 10000" required>
          </div>
          <div class="input-group">
            <label for="current">Current Savings <span style="color:#888;font-weight:400;">(optional)</span></label>
            <input type="number" id="current" min="0" step="0.01" placeholder="e.g. 2000">
          </div>
          <div class="input-group">
            <label for="monthly">Monthly Contribution</label>
            <input type="number" id="monthly" min="0" step="0.01" placeholder="e.g. 500" required>
          </div>
          <div class="input-group">
            <label>Timeframe</label>
            <div class="input-row">
              <input type="number" id="time" min="1" step="1" placeholder="e.g. 12" required>
              <select id="time-unit">
                <option value="months">Months</option>
                <option value="years">Years</option>
              </select>
            </div>
          </div>
          <button type="submit" class="calc-btn" id="calc-btn">Calculate Plan</button>
          <div class="result-section" id="result-section"></div>

  <script>
    // Mobile nav hamburger
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('navMenu');
    hamburger?.addEventListener('click', () => {
      navMenu.classList.toggle('open');
      hamburger.classList.toggle('active');
    });
    hamburger?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        navMenu.classList.toggle('open');
        hamburger.classList.toggle('active');
      }
    });
    Array.from(navMenu?.querySelectorAll('a') || []).forEach(link => {
      link.addEventListener('click', () => {
        navMenu.classList.remove('open');
        hamburger.classList.remove('active');
      });
    });

    function formatCurrency(val) {
      return '$' + Number(val).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    function pluralize(val, singular, plural) {
      return val === 1 ? singular : plural;
    }

    function updateResults() {
      const goal = parseFloat(document.getElementById('goal').value) || 0;
      const current = parseFloat(document.getElementById('current').value) || 0;
      const monthly = parseFloat(document.getElementById('monthly').value) || 0;
      let time = parseFloat(document.getElementById('time').value) || 0;
      const timeUnit = document.getElementById('time-unit').value;

      // Convert years to months if needed
      if (timeUnit === 'years') time = time * 12;

      // Validation
      if (goal <= 0 || monthly < 0 || current < 0 || time < 1) {
        document.getElementById('result-section').innerHTML = '';
        document.getElementById('result-section').classList.remove('visible');
        document.getElementById('progress-bar-wrap').style.display = 'none';
        return;
      }

      // Calculate total saved in timeframe
      const totalSaved = current + (monthly * time);
      const remaining = Math.max(0, goal - totalSaved);

      // Calculate estimated time to reach goal
      let estMonths = 0;
      if (monthly > 0) {
        estMonths = Math.max(0, Math.ceil((goal - current) / monthly));
      } else {
        estMonths = (current >= goal) ? 0 : Infinity;
      }

      // Format estimated time
      let estTimeStr = '';
      if (estMonths === 0) {
        estTimeStr = '<span class="result-value success">Goal already reached!</span>';
      } else if (!isFinite(estMonths)) {
        estTimeStr = '<span class="result-value" style="color:#e74c3c;">Impossible with $0/month</span>';
      } else if (estMonths < 12) {
        estTimeStr = `<span class="result-value success">${estMonths} ${pluralize(estMonths, 'month', 'months')}</span>`;
      } else {
        const years = Math.floor(estMonths / 12);
        const months = estMonths % 12;
        estTimeStr = `<span class="result-value success">${years} ${pluralize(years, 'year', 'years')}${months > 0 ? ' ' + months + ' ' + pluralize(months, 'month', 'months') : ''}</span>`;
      }

      // Results
      document.getElementById('result-section').innerHTML = `
        <div class="result-row">
          <span class="result-label">Total Saved Amount</span>
          <span class="result-value neutral">${formatCurrency(totalSaved)}</span>
        </div>
        <div class="result-row">
          <span class="result-label">Remaining to Goal</span>
          <span class="result-value ${remaining <= 0 ? 'success' : 'neutral'}">${formatCurrency(remaining)}</span>
        </div>
        <div class="result-row">
          <span class="result-label">Estimated Time to Goal</span>
          ${estTimeStr}
        </div>
      `;
      document.getElementById('result-section').classList.add('visible');

      // Progress bar
      const percent = Math.max(0, Math.min(100, (totalSaved / goal) * 100));
      const progressBar = document.getElementById('progress-bar');
      progressBar.style.width = percent + '%';
      progressBar.title = percent.toFixed(1) + '% of goal reached';
      document.getElementById('progress-bar-wrap').style.display = goal > 0 ? 'block' : 'none';
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('input[type="number"]').forEach(input => {
        input.addEventListener('input', function() {
          if (this.value < 0) this.value = '';
          updateResults();
        });
      });
      document.getElementById('savings-form').addEventListener('submit', function(e) {
        e.preventDefault();
        updateResults();
      });
      document.querySelectorAll('input[type="number"], select').forEach(input => {
        input.addEventListener('keyup', updateResults);
        input.addEventListener('change', updateResults);
      });
      updateResults();
    });
  </script>
